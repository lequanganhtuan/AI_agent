<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise URL Safety Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-main">
                <h1>URL Analyzer Platform</h1>
                <p>Advanced real-time risk assessment and multi-phase URL analysis.</p>
            </div>
            <button id="history-btn" class="history-toggle-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" class="history-icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>History</span>
            </button>
        </header>

        <main>
            <form id="analyze-form" class="search-form">
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="Enter URL to analyze (e.g., example.com)" required
                        autocomplete="off">
                    <button type="submit" id="analyze-btn">
                        <span class="btn-text">Analyze</span>
                        <div class="spinner hidden" id="spinner"></div>
                    </button>
                </div>
                <div id="error-message" class="error-message hidden"></div>
            </form>

            <section id="summary-section" class="summary-section hidden">
                <div class="summary-card" id="summary-card" style="cursor: pointer; padding: 25px; text-align: center; border-radius: 12px; transition: all 0.2s;">
                    <div class="verdict-banner-row" style="display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 1.5rem; font-weight: 700;">
                        <span>Analysis Verdict:</span>
                        <span id="summary-verdict" class="status-pill" style="font-size: 1.3rem; padding: 6px 18px;">ALLOW</span>
                    </div>
                    <div class="click-details-hint" style="color: var(--text-muted); font-size: 0.95rem; margin-top: 10px; opacity: 0.85;">
                        Click here to view detailed score, metrics, visual screenshot, and AI explanation &rarr;
                    </div>
                    <!-- Hidden elements to keep script.js bindings happy without crashing -->
                    <div style="display: none;">
                        <svg>
                            <path id="summary-score-path"></path>
                        </svg>
                        <span id="summary-score-value">0</span>
                        <span id="summary-confidence">0%</span>
                        <p id="summary-insight-text">-</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- History Sliding Side Drawer -->
    <div class="history-drawer-overlay" id="history-overlay"></div>
    <div class="history-drawer" id="history-drawer">
        <div class="drawer-header">
            <h3>Scan History</h3>
            <button class="drawer-close" id="drawer-close">&times;</button>
        </div>
        <div class="drawer-filters">
            <input type="text" id="history-search" placeholder="Search URL..." autocomplete="off">
            <select id="history-verdict-filter">
                <option value="ALL">All Verdicts</option>
                <option value="BLOCK">Block</option>
                <option value="WARN">Warn</option>
                <option value="ALLOW">Allow</option>
            </select>
        </div>
        <div class="drawer-content" id="history-list">
            <div class="history-loading hidden" id="history-loading">Loading historical records...</div>
            <div class="history-empty" id="history-empty">No past scans found.</div>
            <div class="history-items-container" id="history-items-container"></div>
        </div>
    </div>

    <script src="/static/script.js?v=1.0.1"></script>
</body>

</html>
