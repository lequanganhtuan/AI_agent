<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise URL Safety Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-main">
                <h1>URL Analyzer Platform</h1>
                <p>Advanced real-time risk assessment and multi-phase URL analysis.</p>
            </div>
            <button id="history-btn" class="history-toggle-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" class="history-icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>History</span>
            </button>
        </header>

        <main>
            <form id="analyze-form" class="search-form">
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="Enter URL to analyze (e.g., example.com)" required
                        autocomplete="off">
                    <button type="submit" id="analyze-btn">
                        <span class="btn-text">Analyze</span>
                        <div class="spinner hidden" id="spinner"></div>
                    </button>
                </div>
                <div id="error-message" class="error-message hidden"></div>
            </form>

            <section id="summary-section" class="summary-section hidden">
                <div class="summary-card" id="summary-card" style="cursor: pointer;">
                    <div class="summary-card-header">
                        <h3>Analysis Verdict</h3>
                        <span class="view-details-hint">Click card to view detailed multi-phase analysis &rarr;</span>
                    </div>
                    <div class="summary-grid">
                        <div class="summary-score-box">
                            <div class="summary-score-circle">
                                <svg viewBox="0 0 36 36" class="circular-chart-small">
                                    <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    <path class="circle" id="summary-score-path" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    <text x="18" y="20.35" class="percentage" id="summary-score-value">0</text>
                                </svg>
                            </div>
                            <span class="summary-label">Risk Score</span>
                        </div>
                        <div class="summary-metric-box">
                            <span class="summary-value status-pill" id="summary-verdict">ALLOW</span>
                            <span class="summary-label">Verdict Action</span>
                        </div>
                        <div class="summary-metric-box">
                            <span class="summary-value" id="summary-confidence">0%</span>
                            <span class="summary-label">Confidence</span>
                        </div>
                    </div>
                    <div class="summary-insight-box">
                        <h4>LLM Analysis Insight</h4>
                        <p id="summary-insight-text">-</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- History Sliding Side Drawer -->
    <div class="history-drawer-overlay" id="history-overlay"></div>
    <div class="history-drawer" id="history-drawer">
        <div class="drawer-header">
            <h3>Scan History</h3>
            <button class="drawer-close" id="drawer-close">&times;</button>
        </div>
        <div class="drawer-filters">
            <input type="text" id="history-search" placeholder="Search URL..." autocomplete="off">
            <select id="history-verdict-filter">
                <option value="ALL">All Verdicts</option>
                <option value="BLOCK">Block</option>
                <option value="WARN">Warn</option>
                <option value="ALLOW">Allow</option>
            </select>
        </div>
        <div class="drawer-content" id="history-list">
            <div class="history-loading hidden" id="history-loading">Loading historical records...</div>
            <div class="history-empty" id="history-empty">No past scans found.</div>
            <div class="history-items-container" id="history-items-container"></div>
        </div>
    </div>

    <script src="/static/script.js?v=1.0.1"></script>
</body>

</html>
