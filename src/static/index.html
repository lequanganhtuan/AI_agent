<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Analyzer Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <h1>URL Analyzer Platform</h1>
            <p>Advanced real-time risk assessment and multi-phase URL analysis.</p>
        </header>

        <main>
            <form id="analyze-form" class="search-form">
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="Enter URL to analyze (e.g., example.com)" required autocomplete="off">
                    <button type="submit" id="analyze-btn">
                        <span class="btn-text">Analyze</span>
                        <div class="spinner hidden" id="spinner"></div>
                    </button>
                </div>
                <div id="error-message" class="error-message hidden"></div>
            </form>

            <section id="results-section" class="results-section hidden">
                <div class="dashboard">
                    <div class="score-card" id="score-card">
                        <div class="score-circle">
                            <svg viewBox="0 0 36 36" class="circular-chart">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" id="score-path" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage" id="score-value">0</text>
                            </svg>
                        </div>
                        <div class="risk-info">
                            <h2>Risk Level</h2>
                            <h3 id="risk-level-text" class="risk-level">Unknown</h3>
                        </div>
                    </div>
                </div>

                <div class="phases-grid">
                    <div class="phase-card" id="phase-lexical">
                        <h4>Lexical Analysis</h4>
                        <ul class="summary-list" id="list-lexical"></ul>
                    </div>
                    <div class="phase-card" id="phase-brand">
                        <h4>Brand Analysis</h4>
                        <ul class="summary-list" id="list-brand"></ul>
                    </div>
                    <div class="phase-card" id="phase-pattern">
                        <h4>Pattern Analysis</h4>
                        <ul class="summary-list" id="list-pattern"></ul>
                    </div>
                    <div class="phase-card" id="phase-tld">
                        <h4>TLD Analysis</h4>
                        <ul class="summary-list" id="list-tld"></ul>
                    </div>
                    <div class="phase-card" id="phase-typo">
                        <h4>Typosquatting Analysis</h4>
                        <ul class="summary-list" id="list-typo"></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
